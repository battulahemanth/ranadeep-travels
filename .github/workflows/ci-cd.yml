name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "update1" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter / code checks
      run: npm run lint --if-present

    - name: Run tests
      run: npm test --if-present

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy Application
      run: |
        echo "Deploying to production server..."
        # Add your specific deployment commands here (e.g., AWS, Vercel, Docker, Heroku)
